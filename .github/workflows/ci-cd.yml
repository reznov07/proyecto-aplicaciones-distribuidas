name: CI/CD E-Voting - Automatización Estricta

on:
  push:
    branches:
      - develop
      - main

env:
  REGISTRY: docker.io
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: evoting-api-gateway # Cambiar según el microservicio

jobs:
  build-and-publish:
    name: Compilar y Publicar en Registro Público
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código fuente
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway # Carpeta del microservicio
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Inyectar cambios en Espacio Lógico (Kubernetes)
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Determinar Entorno Lógico según la Rama
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "NAMESPACE=grupo6-qa" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "NAMESPACE=grupo6-prod" >> $GITHUB_ENV
          fi

      - name: Configurar autenticación con la API de Kubernetes
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Inyectar nueva versión (Rolling Update - Cero Downtime)
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }}