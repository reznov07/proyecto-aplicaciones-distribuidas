name: CI/CD Entorno PROD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Build & Push Servicio Auditoria
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-auditoria
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-auditoria:latest

      - name: Build & Push Servicio Padron
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-padron
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-padron:latest

      - name: Build & Push Servicio Sufragio
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-sufragio
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-sufragio:latest

  deploy-to-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to PROD VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST_PROD }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD_PROD }}
          script: |
            cd /home/dici-uta/proyecto-aplicaciones-distribuidas
            git pull origin main
            
            # Aplicar manifiestos de Kustomize
            kubectl apply -k k8s/environments/prod
            
            # Forzar reinicio de los contenedores para usar las nuevas imágenes
            kubectl rollout restart deployment -n grupo6-prod frontend
            kubectl rollout restart deployment -n grupo6-prod servicio-auditoria
            kubectl rollout restart deployment -n grupo6-prod servicio-padron
            kubectl rollout restart deployment -n grupo6-prod servicio-sufragio