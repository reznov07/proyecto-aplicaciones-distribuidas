name: CI/CD QA

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: Build and Push Auditoria
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-auditoria
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-auditoria:latest

      - name: Build and Push Padron
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-padron
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-padron:latest

      - name: Build and Push Sufragio
        uses: docker/build-push-action@v3
        with:
          context: ./backend/servicio-sufragio
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/servicio-sufragio:latest

  deploy-to-qa:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to QA VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST_QA }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/dici-uta/proyecto-aplicaciones-distribuidas
            git pull origin develop
            kubectl apply -k k8s/environments/qa
            kubectl rollout restart deployment -n qa frontend
            kubectl rollout restart deployment -n qa servicio-auditoria
            kubectl rollout restart deployment -n qa servicio-padron
            kubectl rollout restart deployment -n qa servicio-sufragio