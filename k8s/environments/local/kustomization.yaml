apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: evoting-local

resources:
  - namespace.yaml
  - ../../base
  # Sin ingress.yaml acá a propósito: Docker Desktop Kubernetes no trae un
  # Ingress Controller instalado por defecto. Para esta prueba local vamos
  # a acceder a cada servicio con `kubectl port-forward` (ver instrucciones).

# IMPORTANTE: el tag "local" (no "latest") hace que Kubernetes use
# imagePullPolicy=IfNotPresent automáticamente, así usa la imagen que
# construiste con `docker build` en tu máquina en vez de intentar bajarla
# de un registry remoto que todavía no existe.
images:
  - name: PLACEHOLDER/servicio-sufragio
    newName: servicio-sufragio
    newTag: local
  - name: PLACEHOLDER/servicio-padron
    newName: servicio-padron
    newTag: local
  - name: PLACEHOLDER/servicio-auditoria
    newName: servicio-auditoria
    newTag: local
