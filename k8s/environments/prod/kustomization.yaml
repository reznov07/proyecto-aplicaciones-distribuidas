apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grupo6-prod   # <-- reemplazar "grupoX" por el número real de su grupo

resources:
  - ../../base
  - ingress.yaml

# El pipeline de PROD (.github/workflows/prod.yml) debería fijar acá un tag
# inmutable (ej. el SHA del commit o "stable"), nunca "latest", para que un
# rollback sea predecible.
images:
  - name: PLACEHOLDER/servicio-sufragio
    newName: ghcr.io/reznov07/servicio-sufragio
    newTag: stable
  - name: PLACEHOLDER/servicio-padron
    newName: ghcr.io/reznov07/servicio-padron
    newTag: stable
  - name: PLACEHOLDER/servicio-auditoria
    newName: ghcr.io/reznov07/servicio-auditoria
    newTag: stable

# 2 réplicas por servicio en PROD — el enunciado exige "cero tiempo de
# inactividad" durante despliegues y pruebas de resiliencia en vivo.
replicas:
  - name: servicio-sufragio
    count: 2
  - name: servicio-padron
    count: 2
  - name: servicio-auditoria
    count: 2
