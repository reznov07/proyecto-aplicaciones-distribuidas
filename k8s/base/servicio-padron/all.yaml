apiVersion: v1
kind: ConfigMap
metadata:
  name: servicio-padron-config
data:
  PORT: "3002"
  NODE_ENV: "production"
  DB_HOST: "postgres-padron"
  DB_PORT: "5432"
  DB_NAME: "db_padron"
  RABBITMQ_EXCHANGE: "evoting_exchange"
  RABBITMQ_EXCHANGE_TYPE: "topic"
  RABBITMQ_QUEUE_PADRON: "padron.verificar"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio-padron
  labels:
    app: servicio-padron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicio-padron
  template:
    metadata:
      labels:
        app: servicio-padron
        tier: backend
    spec:
      containers:
        - name: servicio-padron
          image: PLACEHOLDER/servicio-padron:latest  
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: servicio-padron-config
            - secretRef:
                name: postgres-padron-credentials
            - secretRef:
                name: rabbitmq-credentials
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: servicio-padron
  labels:
    app: servicio-padron
spec:
  type: ClusterIP
  selector:
    app: servicio-padron
  ports:
    - port: 3002
      targetPort: 3002
