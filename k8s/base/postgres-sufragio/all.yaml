apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-sufragio-pvc
  labels:
    app: postgres-sufragio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-sufragio
  labels:
    app: postgres-sufragio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres-sufragio
  template:
    metadata:
      labels:
        app: postgres-sufragio
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-sufragio-credentials
          volumeMounts:
            - name: postgres-sufragio-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata   
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init-sufragio.sql
              subPath: init.sql
          readinessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: postgres-sufragio-data
          persistentVolumeClaim:
            claimName: postgres-sufragio-pvc
        - name: init-sql
          configMap:
            name: init-sufragio-sql
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-sufragio
  labels:
    app: postgres-sufragio
spec:
  type: ClusterIP
  selector:
    app: postgres-sufragio
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-postgres-sufragio
  labels:
    app: backup-postgres-sufragio
spec:
  schedule: "*/10 * * * *"  
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: postgres-backup
              image: postgres:15-alpine
              envFrom:
                - secretRef:
                    name: postgres-sufragio-credentials
              env:
                - name: PGHOST
                  value: postgres-sufragio
              command:
                - /bin/sh
                - -c
                - |
                  echo "Iniciando respaldo de base de datos Sufragio..."
                  DATE=$(date +%Y%m%d_%H%M%S)
                  pg_dump -h $PGHOST -U $POSTGRES_USER -d $POSTGRES_DB > /backups/backup_sufragio_$DATE.sql
                  echo "Respaldo completado exitosamente: backup_sufragio_$DATE.sql"
              volumeMounts:
                - name: postgres-sufragio-data
                  mountPath: /backups
                  subPath: backups
          restartPolicy: OnFailure
          volumes:
            - name: postgres-sufragio-data
              persistentVolumeClaim:
                claimName: postgres-sufragio-pvc
