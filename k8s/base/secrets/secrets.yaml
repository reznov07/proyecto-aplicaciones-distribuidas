# Este archivo es solo una referencia. Los Secrets se crean manualmente en
# el clúster para evitar versionar credenciales en el repositorio.
#
# Para crear los Secrets en el servidor, ejecutar una sola vez:
#
#   kubectl create secret generic postgres-sufragio-credentials \
#     --from-literal=POSTGRES_DB=db_sufragio \
#     --from-literal=POSTGRES_USER=user_sufragio \
#     --from-literal=POSTGRES_PASSWORD=pass_sufragio \
#     --from-literal=DB_USER=user_sufragio \
#     --from-literal=DB_PASS=pass_sufragio
#
#   kubectl create secret generic postgres-padron-credentials \
#     --from-literal=POSTGRES_DB=db_padron \
#     --from-literal=POSTGRES_USER=user_padron \
#     --from-literal=POSTGRES_PASSWORD=pass_padron \
#     --from-literal=DB_USER=user_padron \
#     --from-literal=DB_PASS=pass_padron
#
#   kubectl create secret generic postgres-auditoria-credentials \
#     --from-literal=POSTGRES_DB=db_auditoria \
#     --from-literal=POSTGRES_USER=user_auditoria \
#     --from-literal=POSTGRES_PASSWORD=pass_auditoria \
#     --from-literal=DB_USER=user_auditoria \
#     --from-literal=DB_PASS=pass_auditoria
#
#   kubectl create secret generic rabbitmq-credentials \
#     --from-literal=RABBITMQ_DEFAULT_USER=admin \
#     --from-literal=RABBITMQ_DEFAULT_PASS=admin123 \
#     --from-literal=RABBITMQ_URL=amqp://admin:admin123@rabbitmq:5672
# =============================================================================
