# ============================================================================
# ADVERTENCIA: estos son valores de DESARROLLO/DEMO para que el clúster
# levante out-of-the-box. Para QA y PROD, cada overlay (k8s/environments/qa
# y k8s/environments/prod) debe sobrescribir este Secret con sus propios
# valores — NUNCA se suben las contraseñas reales de PROD a git.
# Revisa k8s/environments/*/README-secrets.md para cómo hacerlo con
# `kubectl create secret` directo en el clúster (sin pasar por git).
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-sufragio-credentials
type: Opaque
stringData:
  POSTGRES_DB: db_sufragio
  POSTGRES_USER: user_sufragio
  POSTGRES_PASSWORD: pass_sufragio
  DB_USER: user_sufragio
  DB_PASS: pass_sufragio
---
