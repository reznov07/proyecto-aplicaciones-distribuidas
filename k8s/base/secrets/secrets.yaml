  name: rabbitmq-credentials
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: admin123
  RABBITMQ_URL: amqp://admin:[email protected]:5672
