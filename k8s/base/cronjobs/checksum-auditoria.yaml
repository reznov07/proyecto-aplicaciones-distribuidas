apiVersion: batch/v1
kind: CronJob
metadata:
  name: checksum-postgres-auditoria
  labels:
    app: checksum
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: checksum
            image: postgres:15-alpine
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auditoria-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "auditoria"
            command:
            - /bin/sh
            - -c
            - |
              echo "Calculando checksum de DB Auditoria..."
              FECHA=$(date +%Y%m%d_%H%M%S)
              pg_dump -h postgres-auditoria -U $POSTGRES_USER -d $POSTGRES_DB | sha256sum > /checksums/auditoria_checksum_$FECHA.sha256
              cp /checksums/auditoria_checksum_$FECHA.sha256 /checksums/auditoria_latest.sha256
              echo "Checksum guardado: auditoria_checksum_$FECHA.sha256"
              echo "SHA256: $(cat /checksums/auditoria_checksum_$FECHA.sha256)"
              ls -t /checksums/auditoria_checksum_*.sha256 | tail -n +13 | xargs -r rm --
            volumeMounts:
            - name: checksums-storage
              mountPath: /checksums
          restartPolicy: OnFailure
          volumes:
          - name: checksums-storage
            persistentVolumeClaim:
              claimName: checksums-pvc