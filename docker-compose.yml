version: "3.8"
services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: evoting-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-sufragio:
    image: postgres:15-alpine
    container_name: evoting-postgres-sufragio
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: db_sufragio
      POSTGRES_USER: user_sufragio
      POSTGRES_PASSWORD: pass_sufragio
    volumes:
      - postgres_sufragio_data:/var/lib/postgresql/data
      - ./db-init/init-sufragio.sql:/docker-entrypoint-initdb.d/init-sufragio.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_sufragio -d db_sufragio"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-padron:
    image: postgres:15-alpine
    container_name: evoting-postgres-padron
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: db_padron
      POSTGRES_USER: user_padron
      POSTGRES_PASSWORD: pass_padron
    volumes:
      - postgres_padron_data:/var/lib/postgresql/data
      - ./db-init/init-padron.sql:/docker-entrypoint-initdb.d/init-padron.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_padron -d db_padron"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-auditoria:
    image: postgres:15-alpine
    container_name: evoting-postgres-auditoria
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: db_auditoria
      POSTGRES_USER: user_auditoria
      POSTGRES_PASSWORD: pass_auditoria
    volumes:
      - postgres_auditoria_data:/var/lib/postgresql/data
      - ./db-init/init-auditoria.sql:/docker-entrypoint-initdb.d/init-auditoria.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_auditoria -d db_auditoria"]
      interval: 10s
      timeout: 5s
      retries: 5

  servicio-sufragio:
    build: ./backend/servicio-sufragio
    container_name: evoting-servicio-sufragio
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DB_HOST: postgres-sufragio
      DB_PORT: 5432
      DB_NAME: db_sufragio
      DB_USER: user_sufragio
      DB_PASS: pass_sufragio
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: evoting_exchange
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_QUEUE_SUFRAGIO: sufragio.resultado
    depends_on:
      postgres-sufragio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  servicio-padron:
    build: ./backend/servicio-padron
    container_name: evoting-servicio-padron
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      NODE_ENV: production
      DB_HOST: postgres-padron
      DB_PORT: 5432
      DB_NAME: db_padron
      DB_USER: user_padron
      DB_PASS: pass_padron
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: evoting_exchange
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_QUEUE_PADRON: padron.verificar
    depends_on:
      postgres-padron:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  servicio-auditoria:
    build: ./backend/servicio-auditoria
    container_name: evoting-servicio-auditoria
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      NODE_ENV: production
      DB_HOST: postgres-auditoria
      DB_PORT: 5432
      DB_NAME: db_auditoria
      DB_USER: user_auditoria
      DB_PASS: pass_auditoria
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
      RABBITMQ_EXCHANGE: evoting_exchange
      RABBITMQ_EXCHANGE_TYPE: topic
      RABBITMQ_QUEUE_AUDITORIA: auditoria.registrar
    depends_on:
      postgres-auditoria:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: evoting-frontend
    ports:
      - "8080:80"
    depends_on:
      - servicio-sufragio
      - servicio-auditoria

volumes:
  rabbitmq_data:
  postgres_sufragio_data:
  postgres_padron_data:
  postgres_auditoria_data: