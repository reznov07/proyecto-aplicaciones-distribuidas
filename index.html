<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Votación</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistema de Votación</h1>
        </header>

        <!-- Formulario para ingresar RUT -->
        <div id="rutForm" class="card">
            <h2>Ingresa tu RUT para votar</h2>
            <div class="form-group">
                <input 
                    type="text" 
                    id="rutInput" 
                    placeholder="Ej: 12345678-9" 
                    maxlength="12"
                />
                <button id="consultarBtn" class="btn-primary">Consultar Elección</button>
            </div>
            <div id="rutError" class="error-message"></div>
        </div>

        <!-- Papeleta de votación -->
        <div id="papeletaContainer" class="card" style="display: none;">
            <h2>Selecciona tu candidato</h2>
            <div id="eleccionInfo" class="eleccion-info"></div>
            <div id="candidatosList" class="candidatos-grid"></div>
            <div id="votoError" class="error-message"></div>
            <div class="button-group">
                <button id="votarBtn" class="btn-success">Votar</button>
                <button id="cancelarBtn" class="btn-secondary">Cancelar</button>
            </div>
        </div>

        <!-- Estado del voto -->
        <div id="estadoContainer" class="card" style="display: none;">
            <h2>Estado de tu voto</h2>
            <div id="estadoInfo" class="estado-info">
                <div class="spinner"></div>
                <p id="estadoTexto">Procesando tu voto...</p>
            </div>
            <button id="volverBtn" class="btn-secondary">Volver al inicio</button>
        </div>

        <!-- Resultado final -->
        <div id="resultadoContainer" class="card" style="display: none;">
            <h2>Resultado de tu voto</h2>
            <div id="resultadoInfo" class="resultado-info"></div>
            <button id="reiniciarBtn" class="btn-primary">Votar nuevamente</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
